<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="theme.css" />

<body>
  <header class="site-header">

    <nav class="site-nav">
      <a href="home-page.html">Home</a>
      <a href="about-us.html">About</a>

  <main class="quiz-main">
    <p class="quiz-step">Step 3 of 5</p>
    <h1>What material are you most comfortable in?</h1>
    <p class="quiz-hint">Drag each option into a rating - the higher the rating, the more you love it.</p>

    <div class="rating-boxes">
      <div class="rating" data-rating="1">RATING 1 ⭐</div>
      <div class="rating" data-rating="2">RATING 2 ⭐</div>
      <div class="rating" data-rating="3">RATING 3 ⭐</div>
    </div>

    <div class="categories">
      <div class="category" draggable="true">Cotton</div>
      <div class="category" draggable="true">Sequin</div>
      <div class="category" draggable="true">Silky</div>
      <div class="category" draggable="true">Mesh</div>
      <div class="category" draggable="true">Synthetic</div>
    </div>

    <div class="button-container">
      <button onclick="goToNextPage()">Next</button>
    </div>
  </main>

  <script src="quiz.js"></script>

</html>
