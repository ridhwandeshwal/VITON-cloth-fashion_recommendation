<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results — ReVeRa</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="search.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="home-page.html">Re<span>Ve</span>Ra</a>
    <nav class="site-nav">
      <a href="home-page.html">Home</a>
      <a href="about-us.html">About</a>
    </nav>
    <div class="header-search">
      <input type="text" placeholder="Search styles…" class="search-box" id="search-input">
      <button type="submit" class="search-button" id="search-button" aria-label="Search"><i class="fas fa-search"></i></button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="click1" aria-label="Bag"><i class="fas fa-bag-shopping"></i></button>
      <button class="icon-btn" id="click2" aria-label="Wishlist"><i class="fas fa-heart"></i></button>
      <button class="icon-btn" id="click3" aria-label="Account"><i class="fas fa-user"></i></button>
    </div>
  </header>

  <div class="container search-layout">
    <aside class="filter-panel">
      <h2>Filters</h2>

      <div class="filter-section">
        <h3>Brand</h3>
        <label><input type="checkbox" name="brand" value="Adidas" /> <span class="dot"></span>Adidas</label>
        <label><input type="checkbox" name="brand" value="Calvin Klein" /> <span class="dot"></span>Calvin Klein</label>
        <label><input type="checkbox" name="brand" value="Tommy Hilfiger" /> <span class="dot"></span>Tommy Hilfiger</label>
        <label><input type="checkbox" name="brand" value="Superdry" /> <span class="dot"></span>Superdry</label>
        <label><input type="checkbox" name="brand" value="Levis" /> <span class="dot"></span>Levis</label>
        <label><input type="checkbox" name="brand" value="Nike" /> <span class="dot"></span>Nike</label>
        <label><input type="checkbox" name="brand" value="Puma" /> <span class="dot"></span>Puma</label>
        <label><input type="checkbox" name="brand" value="Gap" /> <span class="dot"></span>Gap</label>
        <label><input type="checkbox" name="brand" value="Polo" /> <span class="dot"></span>Polo</label>
        <label><input type="checkbox" name="brand" value="Guess" /> <span class="dot"></span>Guess</label>
      </div>

      <div class="filter-section">
        <h3>Colour</h3>
        <label><input type="checkbox" name="color" value="black" /> <span class="dot black"></span>Black</label>
        <label><input type="checkbox" name="color" value="pink" /> <span class="dot pink"></span>Pink</label>
        <label><input type="checkbox" name="color" value="white" /> <span class="dot white"></span>White</label>
        <label><input type="checkbox" name="color" value="yellow" /> <span class="dot yellow"></span>Yellow</label>
        <label><input type="checkbox" name="color" value="gray" /> <span class="dot gray"></span>Gray</label>
        <label><input type="checkbox" name="color" value="red" /> <span class="dot red"></span>Red</label>
        <label><input type="checkbox" name="color" value="orange" /> <span class="dot orange"></span>Orange</label>
        <label><input type="checkbox" name="color" value="green" /> <span class="dot green"></span>Green</label>
        <label><input type="checkbox" name="color" value="teal" /> <span class="dot teal"></span>Teal</label>
        <label><input type="checkbox" name="color" value="maroon" /> <span class="dot maroon"></span>Maroon</label>
        <label><input type="checkbox" name="color" value="purple" /> <span class="dot purple"></span>Purple</label>
        <label><input type="checkbox" name="color" value="blue" /> <span class="dot blue"></span>Blue</label>
      </div>

      <div class="filter-section">
        <h3>Material</h3>
        <label><input type="checkbox" name="material" value="cotton" /> <span class="dot"></span>Cotton</label>
        <label><input type="checkbox" name="material" value="silky" /> <span class="dot"></span>Silky</label>
        <label><input type="checkbox" name="material" value="mesh" /> <span class="dot"></span>Mesh</label>
        <label><input type="checkbox" name="material" value="sequin" /> <span class="dot"></span>Sequin</label>
        <label><input type="checkbox" name="material" value="synthetic" /> <span class="dot"></span>Synthetic</label>
      </div>

      <div class="filter-section">
        <h3>Pattern</h3>
        <label><input type="checkbox" name="pattern" value="plain" /> <span class="dot"></span>Plain</label>
        <label><input type="checkbox" name="pattern" value="floral" /> <span class="dot"></span>Floral</label>
        <label><input type="checkbox" name="pattern" value="striped" /> <span class="dot"></span>Striped</label>
        <label><input type="checkbox" name="pattern" value="polka" /> <span class="dot"></span>Polka</label>
        <label><input type="checkbox" name="pattern" value="animal" /> <span class="dot"></span>Animal</label>
        <label><input type="checkbox" name="pattern" value="graphic" /> <span class="dot"></span>Graphic</label>
      </div>

      <div class="filter-section">
        <h3>Category</h3>
        <label><input type="checkbox" name="category" value="t-shirt" /> <span class="dot"></span>T-shirt</label>
        <label><input type="checkbox" name="category" value="tank-top" /> <span class="dot"></span>Tank-Top</label>
        <label><input type="checkbox" name="category" value="tube-top" /> <span class="dot"></span>Tube-Top</label>
        <label><input type="checkbox" name="category" value="bodysuit" /> <span class="dot"></span>Bodysuit/Leotard</label>
        <label><input type="checkbox" name="category" value="tops" /> <span class="dot"></span>Tops</label>
        <label><input type="checkbox" name="category" value="dress" /> <span class="dot"></span>Dress</label>
      </div>
    </aside>

    <section class="results-panel">
      <h1>Search Results</h1>
      <div class="results-grid" id="search-results"></div>
    </section>
  </div>

  <footer class="site-footer">
    <span>ReVeRa</span> — Where fashion meets art.
  </footer>

  <script>
    document.getElementById("search-button").addEventListener("click", async () => {
      const query = document.getElementById("search-input").value.trim();
      if (!query) return;
      try {
        const res = await fetch("/usersearch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        localStorage.setItem("searchResults", JSON.stringify(data.recommendations || []));
        localStorage.setItem("lastSearchQuery", query);
        window.location.reload();
      } catch (err) {
        alert("Search failed. Please try again.");
        console.error(err);
      }
    });
    document.getElementById("search-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") document.getElementById("search-button").click();
    });
  </script>
  <script src="search.js"></script>
</body>
</html>
