<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results - ReVeRa</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="search.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="home-page.html">Re<span>Ve</span>Ra</a>
    <nav class="site-nav">
      <a href="home-page.html">Home</a>
      <a href="about-us.html">About</a>
    </nav>
    <div class="header-search">
      <input type="text" placeholder="Search styles…" class="search-box" id="search-input" autocomplete="off">
      <button type="submit" class="search-button" id="search-button" aria-label="Search"><i class="fas fa-search"></i></button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="click1" aria-label="Bag"><i class="fas fa-bag-shopping"></i></button>
      <button class="icon-btn" id="click2" aria-label="Wishlist"><i class="fas fa-heart"></i></button>
      <button class="icon-btn" id="click3" aria-label="Account"><i class="fas fa-user"></i></button>
    </div>
  </header>

  <div class="container search-layout">
    <section class="results-panel">
      <h1>Search Results</h1>
      <div class="search-loader" id="search-loader" hidden>
        <div class="fancy-loader"></div>
        <p class="loader-text">Finding your styles... Please wait</p>
      </div>
      <div class="results-grid" id="search-results"></div>
    </section>
  </div>

  <footer class="site-footer">
    <span>ReVeRa</span> - Where fashion meets art.
  </footer>

  <script>
    document.getElementById("search-button").addEventListener("click", async () => {
      const query = document.getElementById("search-input").value.trim();
      if (!query) return;
      const loader = document.getElementById("search-loader");
      const results = document.getElementById("search-results");
      loader.hidden = false;
      results.innerHTML = "";
      try {
        const res = await fetch("/usersearch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        const recs = data.recommendations || [];
        localStorage.setItem("searchResults", JSON.stringify(recs));
        localStorage.setItem("lastSearchQuery", query);
        renderSearchResults(recs);
      } catch (err) {
        alert("Search failed. Please try again.");
        console.error(err);
      } finally {
        loader.hidden = true;
      }
    });
    document.getElementById("search-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") document.getElementById("search-button").click();
    });
  </script>
  <script src="search.js"></script>
  <script src="search-suggestions.js"></script>
</body>
</html>
