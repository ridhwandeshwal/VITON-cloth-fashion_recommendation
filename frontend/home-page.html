<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReVeRa - Your Recommendations</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style-home.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="home-page.html">Re<span>Ve</span>Ra</a>
        <nav class="site-nav">
            <a href="home-page.html">Home</a>
            <a href="about-us.html">About</a>
        </nav>
        <div class="header-search">
            <input type="text" placeholder="Search styles…" class="search-box" id="search-input" autocomplete="off">
            <button type="submit" class="search-button" id="search-button" aria-label="Search"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="click1" aria-label="Bag"><i class="fas fa-bag-shopping"></i></button>
            <button class="icon-btn" id="click2" aria-label="Wishlist"><i class="fas fa-heart"></i></button>
            <button class="icon-btn" id="click3" aria-label="Account"><i class="fas fa-user"></i></button>
        </div>
    </header>

    <section class="home-banner">
        <p class="eyebrow">Curated for you</p>
        <div class="banner-tagline">WHERE FASHION MEETS ART<br> DISCOVER YOUR SIGNATURE LOOK</div>
    </section>

    <main class="recommendation-section container">
        <div id="recommendation-container" class="recommendation-container"></div>
        <div class="load-more-wrap">
            <button id="load-more-button" class="btn btn-outline load-more-button">Load More</button>
        </div>
    </main>

    <footer class="site-footer">
        <span>ReVeRa</span> - Where fashion meets art.
    </footer>

    <script src="trial.js"></script>
    <script src="search-suggestions.js"></script>
    <script>
      document.getElementById("search-button").addEventListener("click", async () => {
        const query = document.getElementById("search-input").value.trim();
        if (!query) return;
        try {
          const res = await fetch("/usersearch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query })
          });
          const data = await res.json();
          localStorage.setItem("searchResults", JSON.stringify(data.recommendations || []));
          localStorage.setItem("lastSearchQuery", query);
          window.location.href = "search.html";
        } catch (err) {
          alert("Search failed. Please try again.");
          console.error(err);
        }
      });
      document.getElementById("search-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("search-button").click();
      });
    </script>
</body>
</html>
